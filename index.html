<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bíblia ACF IA Grátis</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#0b1020;--panel:#111827;--card:#172033;--border:#263246;
      --text:#e5e7eb;--muted:#94a3b8;--accent:#d4af37;--ok:#166534;
    }
    body.light{
      --bg:#f3f4f6;--panel:#fff;--card:#fff;--border:#d7dce3;
      --text:#111827;--muted:#6b7280;--accent:#a07c11;--ok:#166534;
    }
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 20px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
    .brand{display:flex;align-items:center;gap:14px}
    .brand-mark{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#f6e8ad);color:#111;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700}
    .brand h1{margin:0;font-size:28px}
    .brand p{margin:6px 0 0;color:var(--muted)}
    .layout{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 93px)}
    .sidebar{padding:18px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:16px}
    .content{padding:20px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
    h1,h2,h3{margin-top:0}
    label{display:block;margin:10px 0 8px;color:var(--muted);font-size:14px}
    input,textarea,select,button{font:inherit}
    input,textarea,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text)}
    button{background:var(--accent);color:#111;border:none;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer}
    .ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .menu{display:grid;gap:10px}
    .menu-btn.active{outline:2px solid rgba(255,255,255,.16)}
    .muted{color:var(--muted)}
    .ok{color:#8ee39d}
    .view{display:none}
    .view.active{display:block}
    .list{display:grid;gap:12px}
    .verse-card,.item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
    .ref,.item-title{font-weight:700;color:var(--accent);margin-bottom:6px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .small-btn{padding:8px 10px;border-radius:10px;font-size:14px}
    .saved{background:var(--ok)!important;color:#fff!important}
    .plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .plan-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
    .plan-item.done{border-color:var(--ok);box-shadow:0 0 0 1px var(--ok) inset}
    .ai-output{margin-top:16px;min-height:220px;white-space:pre-wrap;line-height:1.65;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
    .toast{position:fixed;right:16px;bottom:16px;background:#111827;color:#fff;padding:12px 14px;border-radius:12px;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border)}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">✝</div>
      <div>
        <h1>Bíblia ACF IA Grátis</h1>
        <p>Leitura, busca, favoritos, anotações, plano e IA local sem custo</p>
      </div>
    </div>
    <button id="installBtn" style="display:none">Instalar app</button>
    <button id="themeToggle" class="ghost">Tema</button>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="card">
        <h2>Navegação</h2>
        <label>Livro</label>
        <select id="bookSelect"></select>
        <label>Capítulo</label>
        <select id="chapterSelect"></select>
        <label>Buscar</label>
        <input id="searchInput" type="text" placeholder="Buscar palavra ou referência..." />
      </section>

      <section class="card">
        <h2>Menu</h2>
        <nav class="menu">
          <button class="menu-btn active" data-view="leitura">Leitura</button>
          <button class="menu-btn" data-view="busca">Busca</button>
          <button class="menu-btn" data-view="ia">IA Grátis</button>
          <button class="menu-btn" data-view="favoritos">Favoritos</button>
          <button class="menu-btn" data-view="anotacoes">Anotações</button>
          <button class="menu-btn" data-view="plano">Plano</button>
        </nav>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="statusText" class="muted">Carregando Bíblia...</p>
        <p class="ok">IA local ativa</p>
      </section>
    </aside>

    <section class="content">
      <section id="view-leitura" class="view active">
        <div class="card">
          <h2 id="chapterTitle">Leitura</h2>
          <div id="chapterList" class="list"></div>
        </div>
      </section>

      <section id="view-busca" class="view">
        <div class="card">
          <h2>Resultados da busca</h2>
          <div id="searchList" class="list"></div>
        </div>
      </section>

      <section id="view-ia" class="view">
        <div class="card">
          <h2>IA Bíblica Grátis</h2>
          <label>Modo</label>
          <select id="aiMode">
            <option value="chat">Chat bíblico</option>
            <option value="explicar">Explicar versículo</option>
            <option value="reflexao">Gerar reflexão</option>
            <option value="oracao">Gerar oração</option>
            <option value="estudo">Estudo completo</option>
          </select>
          <textarea id="aiInput" rows="8" placeholder="Digite sua pergunta ou tema..."></textarea>
          <div class="row">
            <button id="askAiBtn">Perguntar à IA</button>
            <button id="saveAiAsNoteBtn" class="ghost">Salvar nas anotações</button>
          </div>
          <div id="aiOutput" class="ai-output">A resposta da IA aparecerá aqui.</div>
        </div>
      </section>

      <section id="view-favoritos" class="view">
        <div class="card">
          <h2>Favoritos</h2>
          <div id="favoritesList" class="list"></div>
        </div>
      </section>

      <section id="view-anotacoes" class="view">
        <div class="card">
          <h2>Anotações</h2>
          <input id="noteRef" type="text" placeholder="Referência. Ex.: João 3:16" />
          <textarea id="noteText" rows="8" placeholder="Escreva sua anotação..."></textarea>
          <div class="row">
            <button id="saveNoteBtn">Salvar anotação</button>
            <button id="clearNoteBtn" class="ghost">Limpar</button>
          </div>
          <div id="notesList" class="list"></div>
        </div>
      </section>

      <section id="view-plano" class="view">
        <div class="card">
          <div class="row between">
            <h2>Plano de leitura</h2>
            <button id="resetPlanBtn" class="ghost">Resetar</button>
          </div>
          <div id="planList" class="plan-grid"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const state = {
      theme: localStorage.getItem("acffree_theme") || "dark",
      favorites: JSON.parse(localStorage.getItem("acffree_favorites") || "[]"),
      notes: JSON.parse(localStorage.getItem("acffree_notes") || "{}"),
      plan: JSON.parse(localStorage.getItem("acffree_plan") || "{}"),
      books: [],
      flatVerses: [],
      currentBook: "",
      currentChapter: 1,
      lastAiAnswer: ""
    };

    const planDays = [
      "Dia 1 - Mateus 5","Dia 2 - João 3","Dia 3 - Salmos 23","Dia 4 - Romanos 8","Dia 5 - Filipenses 4",
      "Dia 6 - Provérbios 3","Dia 7 - Isaías 41","Dia 8 - João 14","Dia 9 - Salmos 91","Dia 10 - Tiago 1"
    ];

    const keywordThemes = {
      ansiedade: ["Filipenses 4:6", "Mateus 6:25", "Salmos 55:22"],
      fe: ["Hebreus 11:1", "Romanos 10:17", "Marcos 11:24"],
      amor: ["1 Coríntios 13:4", "João 3:16", "1 João 4:8"],
      medo: ["Isaías 41:10", "Salmos 23:4", "2 Timóteo 1:7"],
      perdão: ["Mateus 6:14", "Efésios 4:32", "Colossenses 3:13"],
      esperança: ["Romanos 15:13", "Jeremias 29:11", "Salmos 42:11"],
      oração: ["Mateus 6:6", "1 Tessalonicenses 5:17", "Filipenses 4:6"],
      família: ["Josué 24:15", "Provérbios 22:6", "Efésios 6:1"],
      salvação: ["João 3:16", "Romanos 10:9", "Efésios 2:8"]
    };

    function el(id){ return document.getElementById(id); }
    function saveLocal(){
      localStorage.setItem("acffree_theme", state.theme);
      localStorage.setItem("acffree_favorites", JSON.stringify(state.favorites));
      localStorage.setItem("acffree_notes", JSON.stringify(state.notes));
      localStorage.setItem("acffree_plan", JSON.stringify(state.plan));
    }
    function toast(msg){
      const t = el("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"), 1800);
    }
    function setTheme(){ document.body.className = state.theme === "light" ? "light" : ""; }
    function switchView(view){
      document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
      document.querySelectorAll(".menu-btn").forEach(v=>v.classList.remove("active"));
      el("view-" + view).classList.add("active");
      document.querySelector(`.menu-btn[data-view="${view}"]`).classList.add("active");
      if(view === "favoritos") renderFavorites();
      if(view === "anotacoes") renderNotes();
      if(view === "plano") renderPlan();
      if(view === "busca") renderSearch();
    }

    function refFor(v){ return `${v.book} ${v.chapter}:${v.verse}`; }
    function chapterVerses(book, chapter){ return state.flatVerses.filter(v => v.book === book && v.chapter === Number(chapter)); }
    function allChapters(book){ return [...new Set(state.flatVerses.filter(v=>v.book===book).map(v=>v.chapter))].sort((a,b)=>a-b); }
    function findByRef(ref){ return state.flatVerses.find(v => refFor(v).toLowerCase() === ref.toLowerCase()); }

    async function loadBible() {
      try {
        const res = await fetch("./data/acf_biblia_ptbr.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`Erro HTTP ${res.status}`);
        const data = await res.json();

        state.books = data.books || [];
        state.flatVerses = [];

        state.books.forEach(book => {
          (book.chapters || []).forEach((chapter, cIndex) => {
            (chapter || []).forEach((verse, vIndex) => {
              state.flatVerses.push({
                book: book.name,
                chapter: cIndex + 1,
                verse: vIndex + 1,
                text: verse
              });
            });
          });
        });

        if (!state.books.length) throw new Error("JSON sem livros");

        el("statusText").textContent = `Bíblia carregada: ${state.flatVerses.length} versículos`;
        populateBooks();
        renderChapter();
      } catch (e) {
        console.error(e);
        el("statusText").textContent = "Erro ao carregar JSON da Bíblia";
        el("chapterList").innerHTML = `<div class="item">Não foi possível carregar <b>data/acf_biblia_ptbr.json</b>.</div>`;
      }
    }

    function populateBooks(){
      const select = el("bookSelect");
      select.innerHTML = state.books.map(b => `<option value="${b.name}">${b.name}</option>`).join("");
      state.currentBook = state.books[0]?.name || "";
      select.value = state.currentBook;
      populateChapters();
    }

    function populateChapters(){
      const chapters = allChapters(state.currentBook);
      const select = el("chapterSelect");
      select.innerHTML = chapters.map(c => `<option value="${c}">${c}</option>`).join("");
      state.currentChapter = chapters[0] || 1;
      select.value = String(state.currentChapter);
    }

    function renderVerseCard(v, showRemove=false){
      const div = document.createElement("div");
      div.className = "verse-card";
      div.innerHTML = `<div class="ref">${refFor(v)}</div><div>${v.text}</div>`;

      const actions = document.createElement("div");
      actions.className = "actions";

      const fav = document.createElement("button");
      fav.className = "small-btn" + (state.favorites.includes(refFor(v)) ? " saved" : "");
      fav.textContent = state.favorites.includes(refFor(v)) ? "Favorito" : "Salvar favorito";
      fav.onclick = () => toggleFavorite(refFor(v));

      const note = document.createElement("button");
      note.className = "small-btn ghost";
      note.textContent = "Anotar";
      note.onclick = () => {
        el("noteRef").value = refFor(v);
        el("noteText").value = state.notes[refFor(v)] || "";
        switchView("anotacoes");
      };

      const ai = document.createElement("button");
      ai.className = "small-btn ghost";
      ai.textContent = "Explicar grátis";
      ai.onclick = () => {
        el("aiMode").value = "explicar";
        el("aiInput").value = `${refFor(v)}: ${v.text}`;
        switchView("ia");
      };

      actions.appendChild(fav);
      actions.appendChild(note);
      actions.appendChild(ai);

      if(showRemove){
        const rem = document.createElement("button");
        rem.className = "small-btn ghost";
        rem.textContent = "Remover";
        rem.onclick = () => toggleFavorite(refFor(v));
        actions.appendChild(rem);
      }

      div.appendChild(actions);
      return div;
    }

    function renderChapter(){
      el("chapterTitle").textContent = `${state.currentBook} ${state.currentChapter}`;
      const root = el("chapterList");
      root.innerHTML = "";
      const verses = chapterVerses(state.currentBook, state.currentChapter);
      if(!verses.length){
        root.innerHTML = '<div class="item">Nenhum versículo encontrado.</div>';
        return;
      }
      verses.forEach(v => root.appendChild(renderVerseCard(v)));
    }

    function renderSearch(){
      const term = el("searchInput").value.trim().toLowerCase();
      const root = el("searchList");
      root.innerHTML = "";
      if(!term){
        root.innerHTML = '<div class="item">Digite algo para buscar.</div>';
        return;
      }
      const results = state.flatVerses.filter(v =>
        refFor(v).toLowerCase().includes(term) || String(v.text).toLowerCase().includes(term)
      ).slice(0, 200);

      if(!results.length){
        root.innerHTML = '<div class="item">Nenhum resultado encontrado.</div>';
        return;
      }
      results.forEach(v => root.appendChild(renderVerseCard(v)));
    }

    function renderFavorites(){
      const root = el("favoritesList");
      root.innerHTML = "";
      if(!state.favorites.length){
        root.innerHTML = '<div class="item">Nenhum favorito salvo.</div>';
        return;
      }
      state.favorites.forEach(ref => {
        const v = state.flatVerses.find(x => refFor(x) === ref);
        if(v) root.appendChild(renderVerseCard(v, true));
      });
    }

    function renderNotes(){
      const root = el("notesList");
      root.innerHTML = "";
      const entries = Object.entries(state.notes);
      if(!entries.length){
        root.innerHTML = '<div class="item">Nenhuma anotação salva.</div>';
        return;
      }
      entries.forEach(([ref, text]) => {
        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `<div class="item-title">${ref}</div><div>${String(text).slice(0, 280)}</div>`;
        item.onclick = () => {
          el("noteRef").value = ref;
          el("noteText").value = text;
        };
        root.appendChild(item);
      });
    }

    function renderPlan(){
      const root = el("planList");
      root.innerHTML = "";
      planDays.forEach((day, i) => {
        const done = !!state.plan[i];
        const item = document.createElement("div");
        item.className = "plan-item" + (done ? " done" : "");
        item.innerHTML = `<div class="item-title">${day}</div><div>${done ? "Concluído" : "Pendente"}</div>`;
        const btn = document.createElement("button");
        btn.textContent = done ? "Marcar pendente" : "Concluir";
        btn.style.marginTop = "10px";
        btn.onclick = () => togglePlan(i);
        item.appendChild(btn);
        root.appendChild(item);
      });
    }

    function toggleFavorite(ref){
      if(state.favorites.includes(ref)){
        state.favorites = state.favorites.filter(x => x !== ref);
        toast("Favorito removido");
      } else {
        state.favorites.unshift(ref);
        toast("Favorito salvo");
      }
      saveLocal();
      renderFavorites();
      renderChapter();
      renderSearch();
    }

    function saveNote(){
      const ref = el("noteRef").value.trim();
      const text = el("noteText").value.trim();
      if(!ref) return toast("Digite a referência");
      if(text) state.notes[ref] = text; else delete state.notes[ref];
      saveLocal();
      renderNotes();
      toast(text ? "Anotação salva" : "Anotação removida");
    }

    function togglePlan(i){
      state.plan[i] = !state.plan[i];
      saveLocal();
      renderPlan();
    }

    function resetPlan(){
      state.plan = {};
      saveLocal();
      renderPlan();
      toast("Plano resetado");
    }

    
    
    function normalizeText(text){
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function randomPick(list){
      return list[Math.floor(Math.random() * list.length)];
    }

    function uniqueByRef(list){
      const seen = new Set();
      return list.filter(v => {
        const r = refFor(v);
        if(seen.has(r)) return false;
        seen.add(r);
        return true;
      });
    }

    const smartDictionary = {
      ansiedade: ["ansiedade","ansioso","preocupacao","preocupado","medo","cuidado","aflito","aflicao","paz","descanso"],
      fe: ["fe","crer","cre","confiar","confia","esperanca","promessa","fidelidade"],
      amor: ["amor","amar","amou","caridade","misericordia","compaixao"],
      perdao: ["perdao","perdoar","perdoai","misericordia","arrependimento","pecado"],
      medo: ["medo","temor","temas","assombro","coragem","fortalece","fortaleza"],
      familia: ["familia","casa","filhos","pai","mae","marido","mulher"],
      prosperidade: ["prosperar","prosperidade","bencao","abencoado","trabalho","sustento"],
      cura: ["cura","curar","enfermidade","doenca","saude","sararei","sarado"],
      sabedoria: ["sabedoria","sabio","entendimento","prudencia","conselho","ensina"],
      salvacao: ["salvacao","salvo","vida eterna","jesus","cristo","crer","evangelho"],
      oracao: ["oracao","orar","clamar","pedi","pedir","buscai","buscar"],
      pecado: ["pecado","iniquidade","transgressao","arrependimento","santidade"],
      gratidao: ["gratidao","gracas","agradecer","louvor","bendizei"],
      casamento: ["casamento","marido","mulher","esposa","amor","uniao"],
      tristeza: ["tristeza","choro","lagrimas","aflito","consola","consolo"]
    };

    function detectTheme(input){
      const text = normalizeText(input);
      let best = {theme: "geral", score: 0};
      Object.entries(smartDictionary).forEach(([theme, words]) => {
        let score = 0;
        words.forEach(w => {
          if(text.includes(normalizeText(w))) score += 2;
        });
        if(score > best.score) best = {theme, score};
      });
      return best.theme;
    }

    function extractWords(input){
      const stop = new Set(["sobre","como","porque","para","qual","quais","voce","você","explique","explica","fale","versiculo","versículo","biblia","bíblia","deus","senhor","jesus","cristo","uma","com","dos","das","que","por","mais","menos","isso","esse","essa","este","esta","tem"]);
      return normalizeText(input)
        .replace(/[^\w\s]/g, " ")
        .split(/\s+/)
        .filter(w => w.length > 3 && !stop.has(w));
    }

    function findRelatedVerses(input, limit=8){
      const theme = detectTheme(input);
      const words = extractWords(input);
      const themeWords = smartDictionary[theme] || [];
      const allWords = [...new Set([...words, ...themeWords.map(normalizeText)])];

      const scored = state.flatVerses.map(v => {
        const ref = normalizeText(refFor(v));
        const text = normalizeText(v.text);
        let score = 0;

        words.forEach(w => {
          if(ref.includes(w)) score += 3;
          if(text.includes(w)) score += 4;
        });

        themeWords.forEach(w => {
          const nw = normalizeText(w);
          if(text.includes(nw)) score += 2;
        });

        // pesos espirituais gerais
        if(theme === "ansiedade" && (text.includes("paz") || text.includes("cuidado") || text.includes("descanso"))) score += 3;
        if(theme === "fe" && (text.includes("crer") || text.includes("fe") || text.includes("confia"))) score += 3;
        if(theme === "amor" && (text.includes("amor") || text.includes("amou") || text.includes("caridade"))) score += 3;
        if(theme === "medo" && (text.includes("temas") || text.includes("fortalece") || text.includes("medo"))) score += 3;
        if(theme === "oracao" && (text.includes("orai") || text.includes("pedi") || text.includes("clama"))) score += 3;

        return {v, score};
      }).filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score)
        .slice(0, limit)
        .map(x => x.v);

      if(scored.length) return uniqueByRef(scored);

      return state.flatVerses
        .filter(v => ["Salmos","João","Romanos","Mateus","Provérbios","Filipenses"].includes(v.book))
        .slice(0, limit);
    }

    function identifyDirectVerse(input){
      const m = input.match(/([1-3]?\s?[A-Za-zÁ-ú]+)\s+(\d+):(\d+)/i);
      if(!m) return null;

      const rawBook = normalizeText(m[1].trim());
      const chapter = Number(m[2]);
      const verse = Number(m[3]);

      return state.flatVerses.find(v =>
        normalizeText(v.book).includes(rawBook) &&
        v.chapter === chapter &&
        v.verse === verse
      ) || null;
    }

    function verseBlock(verses){
      return verses.map(v => `- ${refFor(v)}: ${v.text}`).join("\n");
    }

    function getMainIdea(theme){
      const ideas = {
        ansiedade: "Deus chama o coração ansioso para descansar nele, trocar preocupação por oração e confiar no cuidado do Senhor.",
        fe: "A fé bíblica é confiança prática em Deus, mesmo quando as circunstâncias ainda não mudaram.",
        amor: "O amor bíblico nasce em Deus e se manifesta em atitudes concretas de cuidado, perdão e serviço.",

    async function loadBible() {
      try {
        const res = await fetch("./data/acf_biblia_ptbr.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`Erro HTTP ${res.status}`);
        const data = await res.json();

        state.books = data.books || [];
        state.flatVerses = [];

        state.books.forEach(book => {
          (book.chapters || []).forEach((chapter, cIndex) => {
            (chapter || []).forEach((verse, vIndex) => {
              state.flatVerses.push({
                book: book.name,
                chapter: cIndex + 1,
                verse: vIndex + 1,
                text: verse
              });
            });
          });
        });

        if (!state.books.length) throw new Error("JSON sem livros");

        el("statusText").textContent = `Bíblia carregada: ${state.flatVerses.length} versículos`;
        populateBooks();
        renderChapter();
      } catch (e) {
        console.error(e);
        el("statusText").textContent = "Erro ao carregar JSON da Bíblia";
        el("chapterList").innerHTML = `<div class="item">Não foi possível carregar <b>data/acf_biblia_ptbr.json</b>.</div>`;
      }
    }

    function normalizeText(text){
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function randomPick(list){
      return list[Math.floor(Math.random() * list.length)];
    }

    function getThemeRefs(input){
      const text = normalizeText(input);
      for(const key of Object.keys(keywordThemes)){
        if(text.includes(normalizeText(key))) return keywordThemes[key];
      }

      const words = text.split(/\s+/).filter(w => w.length > 3);
      return state.flatVerses
        .filter(v => words.some(w => normalizeText(v.text).includes(w)))
        .slice(0, 5)
        .map(refFor);
    }

    function makeVerseSnippet(ref){
      const verse = findByRef(ref);
      if(!verse) return `- ${ref}`;
      return `- ${ref}: ${verse.text}`;
    }

    function findRelatedVerses(input, limit=5){
      const text = normalizeText(input);
      const words = text.split(/\s+/).filter(w => w.length > 3);

      return state.flatVerses.map(v => {
        const verseText = normalizeText(`${refFor(v)} ${v.text}`);
        let score = 0;
        words.forEach(w => {
          if(verseText.includes(w)) score += 1;
        });
        return {v, score};
      }).filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score)
        .slice(0, limit)
        .map(x => x.v);
    }

    function identifyDirectVerse(input){
      const m = input.match(/([1-3]?\s?[A-Za-zÁ-ú]+)\s+(\d+):(\d+)/i);
      if(!m) return null;

      const rawBook = normalizeText(m[1].trim());
      const chapter = Number(m[2]);
      const verse = Number(m[3]);

      return state.flatVerses.find(v =>
        normalizeText(v.book).includes(rawBook) &&
        v.chapter === chapter &&
        v.verse === verse
      ) || null;
    }

    window.addEventListener("appinstalled", ()=>{
      toast("App instalado com sucesso");
      if(installButton) installButton.style.display="none";
    });
    if("serviceWorker" in navigator){
      window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
    }

document.querySelectorAll(".menu-btn").forEach(v=>v.classList.remove("active"));
      el("view-" + view).classList.add("active");
      document.querySelector(`.menu-btn[data-view="${view}"]`).classList.add("active");
      if(view === "favoritos") renderFavorites();
      if(view === "anotacoes") renderNotes();
      if(view === "plano") renderPlan();
      if(view === "busca") renderSearch();
    }

    function refFor(v){ return `${v.book} ${v.chapter}:${v.verse}`; }
    function chapterVerses(book, chapter){ return state.flatVerses.filter(v => v.book === book && v.chapter === Number(chapter)); }
    function allChapters(book){ return [...new Set(state.flatVerses.filter(v=>v.book===book).map(v=>v.chapter))].sort((a,b)=>a-b); }
    function findByRef(ref){ return state.flatVerses.find(v => refFor(v).toLowerCase() === ref.toLowerCase()); }

    async function loadBible() {
      try {
        const res = await fetch("./data/acf_biblia_ptbr.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`Erro HTTP ${res.status}`);
        const data = await res.json();

        state.books = data.books || [];
        state.flatVerses = [];

        state.books.forEach(book => {
          (book.chapters || []).forEach((chapter, cIndex) => {
            (chapter || []).forEach((verse, vIndex) => {
              state.flatVerses.push({
                book: book.name,
                chapter: cIndex + 1,
                verse: vIndex + 1,
                text: verse
              });
            });
          });
        });

        if (!state.books.length) throw new Error("JSON sem livros");

        el("statusText").textContent = `Bíblia carregada: ${state.flatVerses.length} versículos`;
        populateBooks();
        renderChapter();
      } catch (e) {
        console.error(e);
        el("statusText").textContent = "Erro ao carregar JSON da Bíblia";
        el("chapterList").innerHTML = `<div class="item">Não foi possível carregar <b>data/acf_biblia_ptbr.json</b>.</div>`;
      }
    }

    function populateBooks(){
      const select = el("bookSelect");
      select.innerHTML = state.books.map(b => `<option value="${b.name}">${b.name}</option>`).join("");
      state.currentBook = state.books[0]?.name || "";
      select.value = state.currentBook;
      populateChapters();
    }

    function populateChapters(){
      const chapters = allChapters(state.currentBook);
      const select = el("chapterSelect");
      select.innerHTML = chapters.map(c => `<option value="${c}">${c}</option>`).join("");
      state.currentChapter = chapters[0] || 1;
      select.value = String(state.currentChapter);
    }

    function renderVerseCard(v, showRemove=false){
      const div = document.createElement("div");
      div.className = "verse-card";
      div.innerHTML = `<div class="ref">${refFor(v)}</div><div>${v.text}</div>`;

      const actions = document.createElement("div");
      actions.className = "actions";

      const fav = document.createElement("button");
      fav.className = "small-btn" + (state.favorites.includes(refFor(v)) ? " saved" : "");
      fav.textContent = state.favorites.includes(refFor(v)) ? "Favorito" : "Salvar favorito";
      fav.onclick = () => toggleFavorite(refFor(v));

      const note = document.createElement("button");
      note.className = "small-btn ghost";
      note.textContent = "Anotar";
      note.onclick = () => {
        el("noteRef").value = refFor(v);
        el("noteText").value = state.notes[refFor(v)] || "";
        switchView("anotacoes");
      };

      const ai = document.createElement("button");
      ai.className = "small-btn ghost";
      ai.textContent = "Explicar grátis";
      ai.onclick = () => {
        el("aiMode").value = "explicar";
        el("aiInput").value = `${refFor(v)}: ${v.text}`;
        switchView("ia");
      };

      actions.appendChild(fav);
      actions.appendChild(note);
      actions.appendChild(ai);

      if(showRemove){
        const rem = document.createElement("button");
        rem.className = "small-btn ghost";
        rem.textContent = "Remover";
        rem.onclick = () => toggleFavorite(refFor(v));
        actions.appendChild(rem);
      }

      div.appendChild(actions);
      return div;
    }

    function renderChapter(){
      el("chapterTitle").textContent = `${state.currentBook} ${state.currentChapter}`;
      const root = el("chapterList");
      root.innerHTML = "";
      const verses = chapterVerses(state.currentBook, state.currentChapter);
      if(!verses.length){
        root.innerHTML = '<div class="item">Nenhum versículo encontrado.</div>';
        return;
      }
      verses.forEach(v => root.appendChild(renderVerseCard(v)));
    }

    function renderSearch(){
      const term = el("searchInput").value.trim().toLowerCase();
      const root = el("searchList");
      root.innerHTML = "";
      if(!term){
        root.innerHTML = '<div class="item">Digite algo para buscar.</div>';
        return;
      }
      const results = state.flatVerses.filter(v =>
        refFor(v).toLowerCase().includes(term) || String(v.text).toLowerCase().includes(term)
      ).slice(0, 200);

      if(!results.length){
        root.innerHTML = '<div class="item">Nenhum resultado encontrado.</div>';
        return;
      }
      results.forEach(v => root.appendChild(renderVerseCard(v)));
    }

    function renderFavorites(){
      const root = el("favoritesList");
      root.innerHTML = "";
      if(!state.favorites.length){
        root.innerHTML = '<div class="item">Nenhum favorito salvo.</div>';
        return;
      }
      state.favorites.forEach(ref => {
        const v = state.flatVerses.find(x => refFor(x) === ref);
        if(v) root.appendChild(renderVerseCard(v, true));
      });
    }

    function renderNotes(){
      const root = el("notesList");
      root.innerHTML = "";
      const entries = Object.entries(state.notes);
      if(!entries.length){
        root.innerHTML = '<div class="item">Nenhuma anotação salva.</div>';
        return;
      }
      entries.forEach(([ref, text]) => {
        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `<div class="item-title">${ref}</div><div>${String(text).slice(0, 280)}</div>`;
        item.onclick = () => {
          el("noteRef").value = ref;
          el("noteText").value = text;
        };
        root.appendChild(item);
      });
    }

    function renderPlan(){
      const root = el("planList");
      root.innerHTML = "";
      planDays.forEach((day, i) => {
        const done = !!state.plan[i];
        const item = document.createElement("div");
        item.className = "plan-item" + (done ? " done" : "");
        item.innerHTML = `<div class="item-title">${day}</div><div>${done ? "Concluído" : "Pendente"}</div>`;
        const btn = document.createElement("button");
        btn.textContent = done ? "Marcar pendente" : "Concluir";
        btn.style.marginTop = "10px";
        btn.onclick = () => togglePlan(i);
        item.appendChild(btn);
        root.appendChild(item);
      });
    }

    function toggleFavorite(ref){
      if(state.favorites.includes(ref)){
        state.favorites = state.favorites.filter(x => x !== ref);
        toast("Favorito removido");
      } else {
        state.favorites.unshift(ref);
        toast("Favorito salvo");
      }
      saveLocal();
      renderFavorites();
      renderChapter();
      renderSearch();
    }

    function saveNote(){
      const ref = el("noteRef").value.trim();
      const text = el("noteText").value.trim();
      if(!ref) return toast("Digite a referência");
      if(text) state.notes[ref] = text; else delete state.notes[ref];
      saveLocal();
      renderNotes();
      toast(text ? "Anotação salva" : "Anotação removida");
    }

    function togglePlan(i){
      state.plan[i] = !state.plan[i];
      saveLocal();
      renderPlan();
    }

    function resetPlan(){
      state.plan = {};
      saveLocal();
      renderPlan();
      toast("Plano resetado");
    }

    function getThemeRefs(input){
      const text = input.toLowerCase();
      for (const key of Object.keys(keywordThemes)) {
        if (text.includes(key)) return keywordThemes[key];
      }
      return [];
    }

    function makeVerseSnippet(ref){
      const verse = findByRef(ref);
      if(!verse) return `- ${ref}`;
      return `- ${ref}: ${verse.text}`;
    }

    function buildFreeAnswer(mode, input){
      const refs = getThemeRefs(input);
      const directRefMatch = input.match(/([1-3]?\s?[A-Za-zÁ-ú]+)\s+(\d+):(\d+)/i);

      if(mode === "explicar"){
        let verseText = "";
        let ref = "";
        if(directRefMatch){
          ref = `${directRefMatch[1].trim()} ${directRefMatch[2]}:${directRefMatch[3]}`;
          const v = findByRef(ref);
          if(v) verseText = v.text;
        } else {
          const m = input.match(/^(.*?):\s*(.*)$/);
          if(m){ ref = m[1]; verseText = m[2]; }
        }
        return `Explicação bíblica\n\nReferência: ${ref || "Não identificada"}\n\nSentido principal:\nEsse trecho aponta para a ação de Deus, chamando a pessoa à fé, obediência e confiança.\n\nAplicação prática:\n- ore sobre esse texto\n- observe o que ele revela sobre Deus\n- veja como aplicar hoje na sua vida\n\nTexto analisado:\n${verseText || "Cole ou digite o versículo para uma explicação mais precisa."}`;
      }

      if(mode === "reflexao"){
        return `Reflexão\n\nTema: ${input}\n\nA Palavra de Deus nos mostra que mesmo em tempos difíceis o Senhor continua presente, guiando, sustentando e fortalecendo. Quando olhamos para a Bíblia, percebemos que Deus não abandona os seus filhos.\n\nAplicação:\n- confie em Deus hoje\n- persevere em oração\n- lembre-se das promessas bíblicas\n\nVersículos sugeridos:\n${refs.length ? refs.map(makeVerseSnippet).join("\n") : "- Busque também Salmos, João e Romanos sobre esse tema."}`;
      }

      if(mode === "oracao"){
        return `Oração\n\nSenhor Deus, eu coloco diante de Ti este tema: ${input}.\nFortalece meu coração, dirige meus passos e ajuda-me a permanecer firme na Tua Palavra.\nDá-me sabedoria, paz e confiança para viver de acordo com a Tua vontade.\nEm nome de Jesus, amém.`;
      }

      if(mode === "estudo"){
        return `Estudo bíblico\n\nTítulo: ${input}\n\nIntrodução:\nA Bíblia trata esse tema de forma prática e espiritual, mostrando como Deus age e como devemos responder.\n\nVersículos principais:\n${refs.length ? refs.map(makeVerseSnippet).join("\n") : "- João 3:16\n- Romanos 8:28\n- Filipenses 4:6"}\n\nPontos do estudo:\n1. O que esse tema revela sobre Deus\n2. Como aplicar no dia a dia\n3. Qual mudança prática esse texto pede\n\nPerguntas para reflexão:\n- O que Deus está falando comigo nesse assunto?\n- O que preciso mudar?\n- Como posso viver isso hoje?\n\nConclusão:\nDeus continua falando por meio da Sua Palavra. O mais importante é ler, meditar, praticar e perseverar.`;
      }

      return `Resposta bíblica\n\nPergunta: ${input}\n\nA Bíblia orienta que busquemos a Deus com sinceridade, fé e obediência. Leia, ore e compare esse tema com outras passagens.\n\nVersículos relacionados:\n${refs.length ? refs.map(makeVerseSnippet).join("\n") : "- Salmos 119:105\n- João 14:6\n- Romanos 15:4"}`;
    }

    function askAI(){
      const mode = el("aiMode").value;
      const input = el("aiInput").value.trim();
      if(!input) return toast("Digite sua pergunta");
      const answer = buildFreeAnswer(mode, input);
      state.lastAiAnswer = answer;
      el("aiOutput").textContent = answer;
    }

    function saveAiAsNote(){
      const text = state.lastAiAnswer.trim();
      if(!text) return toast("Ainda não há resposta");
      const ref = el("noteRef").value.trim() || "IA grátis - estudo";
      el("noteRef").value = ref;
      el("noteText").value = text;
      saveNote();
      switchView("anotacoes");
    }

    document.querySelectorAll(".menu-btn").forEach(btn => btn.addEventListener("click", ()=>switchView(btn.dataset.view)));
    el("themeToggle").addEventListener("click", ()=>{ state.theme = state.theme === "dark" ? "light" : "dark"; setTheme(); saveLocal(); });
    el("bookSelect").addEventListener("change", ()=>{ state.currentBook = el("bookSelect").value; populateChapters(); renderChapter(); });
    el("chapterSelect").addEventListener("change", ()=>{ state.currentChapter = Number(el("chapterSelect").value); renderChapter(); });
    el("searchInput").addEventListener("input", ()=>{ switchView("busca"); renderSearch(); });
    el("saveNoteBtn").addEventListener("click", saveNote);
    el("clearNoteBtn").addEventListener("click", ()=>{ el("noteText").value = ""; saveNote(); });
    el("resetPlanBtn").addEventListener("click", resetPlan);
    el("askAiBtn").addEventListener("click", askAI);
    el("saveAiAsNoteBtn").addEventListener("click", saveAiAsNote);

    setTheme();
    renderFavorites();
    renderNotes();
    renderPlan();
    loadBible();
  </script>
</body>
</html>

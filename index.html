<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bíblia ACF IA Grátis</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-512.png" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />
  <style>
    *{box-sizing:border-box}
    :root{--bg:#0b1020;--panel:#111827;--card:#172033;--border:#263246;--text:#e5e7eb;--muted:#94a3b8;--accent:#d4af37;--ok:#166534}
    body.light{--bg:#f3f4f6;--panel:#fff;--card:#fff;--border:#d7dce3;--text:#111827;--muted:#6b7280;--accent:#a07c11;--ok:#166534}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 20px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
    .brand{display:flex;align-items:center;gap:14px}
    .brand-icon{width:64px;height:64px;border-radius:16px;object-fit:cover}
    .brand h1{margin:0;font-size:28px}.brand p{margin:6px 0 0;color:var(--muted)}
    .layout{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 101px)}
    .sidebar{padding:18px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:16px}
    .content{padding:20px}.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
    h1,h2,h3{margin-top:0}label{display:block;margin:10px 0 8px;color:var(--muted);font-size:14px}
    input,textarea,select,button{font:inherit}
    input,textarea,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text)}
    button{background:var(--accent);color:#111;border:none;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer}
    .ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{justify-content:space-between}
    .menu{display:grid;gap:10px}.menu-btn.active{outline:2px solid rgba(255,255,255,.16)}
    .muted{color:var(--muted)}.ok{color:#8ee39d}
    .view{display:none}.view.active{display:block}
    .list{display:grid;gap:12px}.verse-card,.item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
    .ref,.item-title{font-weight:700;color:var(--accent);margin-bottom:6px}.verse-text{line-height:1.6}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .small-btn{padding:8px 10px;border-radius:10px;font-size:14px}.saved{background:var(--ok)!important;color:#fff!important}
    .plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}.plan-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
    .plan-item.done{border-color:var(--ok);box-shadow:0 0 0 1px var(--ok) inset}
    .ai-output{margin-top:16px;min-height:220px;white-space:pre-wrap;line-height:1.65;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
    .toast{position:fixed;right:16px;bottom:16px;background:#111827;color:#fff;padding:12px 14px;border-radius:12px;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}
    #installBtn{display:none}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border)}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="./icons/icon-192.png" alt="Ícone" class="brand-icon" />
      <div>
        <h1>Bíblia ACF IA Grátis</h1>
        <p>Leitura, busca, favoritos, anotações, plano e IA local sem custo</p>
      </div>
    </div>
    <div class="row">
      <button id="installBtn">Instalar app</button>
      <button id="themeToggle" class="ghost">Tema</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="card">
        <h2>Navegação</h2>
        <label>Livro</label><select id="bookSelect"></select>
        <label>Capítulo</label><select id="chapterSelect"></select>
        <label>Buscar</label><input id="searchInput" type="text" placeholder="Buscar palavra ou referência..." />
      </section>

      <section class="card">
        <h2>Menu</h2>
        <nav class="menu">
          <button class="menu-btn active" data-view="leitura">Leitura</button>
          <button class="menu-btn" data-view="busca">Busca</button>
          <button class="menu-btn" data-view="ia">IA Grátis</button>
          <button class="menu-btn" data-view="favoritos">Favoritos</button>
          <button class="menu-btn" data-view="anotacoes">Anotações</button>
          <button class="menu-btn" data-view="plano">Plano</button>
        </nav>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="statusText" class="muted">Carregando Bíblia...</p>
        <p class="ok">IA local ativa</p>
      </section>
    </aside>

    <section class="content">
      <section id="view-leitura" class="view active"><div class="card"><h2 id="chapterTitle">Leitura</h2><div id="chapterList" class="list"></div></div></section>
      <section id="view-busca" class="view"><div class="card"><h2>Resultados da busca</h2><div id="searchList" class="list"></div></div></section>
      <section id="view-ia" class="view"><div class="card"><h2>IA Bíblica Grátis</h2>
        <label>Modo</label>
        <select id="aiMode">
          <option value="chat">Chat bíblico</option>
          <option value="explicar">Explicar versículo</option>
          <option value="reflexao">Gerar reflexão</option>
          <option value="oracao">Gerar oração</option>
          <option value="estudo">Estudo completo</option>
        </select>
        <textarea id="aiInput" rows="8" placeholder="Digite sua pergunta ou tema..."></textarea>
        <div class="row"><button id="askAiBtn">Perguntar à IA</button><button id="saveAiAsNoteBtn" class="ghost">Salvar nas anotações</button></div>
        <div id="aiOutput" class="ai-output">A resposta da IA aparecerá aqui.</div>
      </div></section>
      <section id="view-favoritos" class="view"><div class="card"><h2>Favoritos</h2><div id="favoritesList" class="list"></div></div></section>
      <section id="view-anotacoes" class="view"><div class="card"><h2>Anotações</h2>
        <input id="noteRef" type="text" placeholder="Referência. Ex.: João 3:16" />
        <textarea id="noteText" rows="8" placeholder="Escreva sua anotação..."></textarea>
        <div class="row"><button id="saveNoteBtn">Salvar anotação</button><button id="clearNoteBtn" class="ghost">Limpar</button></div>
        <div id="notesList" class="list"></div></div></section>
      <section id="view-plano" class="view"><div class="card"><div class="row between"><h2>Plano de leitura</h2><button id="resetPlanBtn" class="ghost">Resetar</button></div><div id="planList" class="plan-grid"></div></div></section>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const DATA_URL = "./data/acf_biblia_ptbr.json";
    const state = {
      theme: localStorage.getItem("acfcorr_theme") || "dark",
      favorites: JSON.parse(localStorage.getItem("acfcorr_favorites") || "[]"),
      notes: JSON.parse(localStorage.getItem("acfcorr_notes") || "{}"),
      plan: JSON.parse(localStorage.getItem("acfcorr_plan") || "{}"),
      books: [], flatVerses: [], currentBook: "", currentChapter: 1, lastAiAnswer: ""
    };

    const planDays = ["Dia 1 - Mateus 5","Dia 2 - João 3","Dia 3 - Salmos 23","Dia 4 - Romanos 8","Dia 5 - Filipenses 4","Dia 6 - Provérbios 3","Dia 7 - Isaías 41","Dia 8 - João 14","Dia 9 - Salmos 91","Dia 10 - Tiago 1"];
    const keywordThemes = {
      ansiedade:["ansiedade","ansioso","preocupacao","preocupado","medo","cuidado","aflito","aflicao","paz","descanso"],
      fe:["fe","crer","cre","confiar","confia","esperanca","promessa","fidelidade"],
      amor:["amor","amar","amou","caridade","misericordia","compaixao"],
      perdao:["perdao","perdoar","perdoai","misericordia","arrependimento","pecado"],
      medo:["medo","temor","temas","assombro","coragem","fortalece","fortaleza"],
      familia:["familia","casa","filhos","pai","mae","marido","mulher"],
      cura:["cura","curar","enfermidade","doenca","saude","sararei","sarado"],
      sabedoria:["sabedoria","sabio","entendimento","prudencia","conselho","ensina"],
      salvacao:["salvacao","salvo","vida eterna","jesus","cristo","crer","evangelho"],
      oracao:["oracao","orar","clamar","pedi","pedir","buscai","buscar"],
      tristeza:["tristeza","choro","lagrimas","aflito","consola","consolo"]
    };

    function el(id){return document.getElementById(id)}
    function saveLocal(){localStorage.setItem("acfcorr_theme",state.theme);localStorage.setItem("acfcorr_favorites",JSON.stringify(state.favorites));localStorage.setItem("acfcorr_notes",JSON.stringify(state.notes));localStorage.setItem("acfcorr_plan",JSON.stringify(state.plan))}
    function toast(msg){const t=el("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800)}
    function setTheme(){document.body.className=state.theme==="light"?"light":""}
    function switchView(view){document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));document.querySelectorAll(".menu-btn").forEach(v=>v.classList.remove("active"));el("view-"+view).classList.add("active");document.querySelector(`.menu-btn[data-view="${view}"]`).classList.add("active");if(view==="favoritos")renderFavorites();if(view==="anotacoes")renderNotes();if(view==="plano")renderPlan();if(view==="busca")renderSearch()}
    function refFor(v){return `${v.book} ${v.chapter}:${v.verse}`}
    function chapterVerses(book,chapter){return state.flatVerses.filter(v=>v.book===book&&v.chapter===Number(chapter))}
    function allChapters(book){return [...new Set(state.flatVerses.filter(v=>v.book===book).map(v=>v.chapter))].sort((a,b)=>a-b)}
    function normalizeText(text){return String(text||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
    function randomPick(list){return list[Math.floor(Math.random()*list.length)]}
    function findByRef(ref){return state.flatVerses.find(v=>normalizeText(refFor(v))===normalizeText(ref))}

    async function loadBible(){
      try{
        el("statusText").textContent="Carregando JSON da Bíblia...";
        const res=await fetch(DATA_URL,{cache:"no-store"});
        if(!res.ok) throw new Error("HTTP "+res.status+" em "+DATA_URL);
        const data=await res.json();
        state.books=data.books||[];
        state.flatVerses=[];
        state.books.forEach(book=>{
          (book.chapters||[]).forEach((chapter,cIndex)=>{
            (chapter||[]).forEach((verse,vIndex)=>{
              state.flatVerses.push({book:book.name,chapter:cIndex+1,verse:vIndex+1,text:verse});
            });
          });
        });
        if(!state.books.length) throw new Error("JSON sem livros");
        el("statusText").textContent=`Bíblia carregada: ${state.flatVerses.length} versículos`;
        populateBooks();renderChapter();
      }catch(e){
        console.error(e);
        el("statusText").textContent="Erro ao carregar a Bíblia";
        el("chapterList").innerHTML=`<div class="item">Não foi possível carregar <b>${DATA_URL}</b>.<br>Confira se a pasta <b>data</b> subiu no GitHub.</div>`;
      }
    }

    function populateBooks(){const s=el("bookSelect");s.innerHTML=state.books.map(b=>`<option value="${b.name}">${b.name}</option>`).join("");state.currentBook=state.books[0]?.name||"";s.value=state.currentBook;populateChapters()}
    function populateChapters(){const ch=allChapters(state.currentBook);const s=el("chapterSelect");s.innerHTML=ch.map(c=>`<option value="${c}">${c}</option>`).join("");state.currentChapter=ch[0]||1;s.value=String(state.currentChapter)}
    function renderVerseCard(v,showRemove=false){
      const div=document.createElement("div");div.className="verse-card";div.innerHTML=`<div class="ref">${refFor(v)}</div><div class="verse-text">${v.text}</div>`;
      const actions=document.createElement("div");actions.className="actions";
      const fav=document.createElement("button");fav.className="small-btn"+(state.favorites.includes(refFor(v))?" saved":"");fav.textContent=state.favorites.includes(refFor(v))?"Favorito":"Salvar favorito";fav.onclick=()=>toggleFavorite(refFor(v));
      const note=document.createElement("button");note.className="small-btn ghost";note.textContent="Anotar";note.onclick=()=>{el("noteRef").value=refFor(v);el("noteText").value=state.notes[refFor(v)]||"";switchView("anotacoes")};
      const ai=document.createElement("button");ai.className="small-btn ghost";ai.textContent="Explicar grátis";ai.onclick=()=>{el("aiMode").value="explicar";el("aiInput").value=`${refFor(v)}: ${v.text}`;switchView("ia")};
      actions.appendChild(fav);actions.appendChild(note);actions.appendChild(ai);
      if(showRemove){const rem=document.createElement("button");rem.className="small-btn ghost";rem.textContent="Remover";rem.onclick=()=>toggleFavorite(refFor(v));actions.appendChild(rem)}
      div.appendChild(actions);return div;
    }
    function renderChapter(){el("chapterTitle").textContent=`${state.currentBook} ${state.currentChapter}`;const root=el("chapterList");root.innerHTML="";const verses=chapterVerses(state.currentBook,state.currentChapter);if(!verses.length){root.innerHTML='<div class="item">Nenhum versículo encontrado.</div>';return}verses.forEach(v=>root.appendChild(renderVerseCard(v)))}
    function renderSearch(){const term=normalizeText(el("searchInput").value.trim());const root=el("searchList");root.innerHTML="";if(!term){root.innerHTML='<div class="item">Digite algo para buscar.</div>';return}const results=state.flatVerses.filter(v=>normalizeText(refFor(v)).includes(term)||normalizeText(v.text).includes(term)).slice(0,200);if(!results.length){root.innerHTML='<div class="item">Nenhum resultado encontrado.</div>';return}results.forEach(v=>root.appendChild(renderVerseCard(v)))}
    function renderFavorites(){const root=el("favoritesList");root.innerHTML="";if(!state.favorites.length){root.innerHTML='<div class="item">Nenhum favorito salvo.</div>';return}state.favorites.forEach(ref=>{const v=state.flatVerses.find(x=>refFor(x)===ref);if(v)root.appendChild(renderVerseCard(v,true))})}
    function renderNotes(){const root=el("notesList");root.innerHTML="";const entries=Object.entries(state.notes);if(!entries.length){root.innerHTML='<div class="item">Nenhuma anotação salva.</div>';return}entries.forEach(([ref,text])=>{const item=document.createElement("div");item.className="item";item.innerHTML=`<div class="item-title">${ref}</div><div>${String(text).slice(0,280)}</div>`;item.onclick=()=>{el("noteRef").value=ref;el("noteText").value=text};root.appendChild(item)})}
    function renderPlan(){const root=el("planList");root.innerHTML="";planDays.forEach((day,i)=>{const done=!!state.plan[i];const item=document.createElement("div");item.className="plan-item"+(done?" done":"");item.innerHTML=`<div class="item-title">${day}</div><div>${done?"Concluído":"Pendente"}</div>`;const btn=document.createElement("button");btn.textContent=done?"Marcar pendente":"Concluir";btn.style.marginTop="10px";btn.onclick=()=>togglePlan(i);item.appendChild(btn);root.appendChild(item)})}
    function toggleFavorite(ref){if(state.favorites.includes(ref)){state.favorites=state.favorites.filter(x=>x!==ref);toast("Favorito removido")}else{state.favorites.unshift(ref);toast("Favorito salvo")}saveLocal();renderFavorites();renderChapter();renderSearch()}
    function saveNote(){const ref=el("noteRef").value.trim();const text=el("noteText").value.trim();if(!ref)return toast("Digite a referência");if(text)state.notes[ref]=text;else delete state.notes[ref];saveLocal();renderNotes();toast(text?"Anotação salva":"Anotação removida")}
    function togglePlan(i){state.plan[i]=!state.plan[i];saveLocal();renderPlan()}
    function resetPlan(){state.plan={};saveLocal();renderPlan();toast("Plano resetado")}

    function detectTheme(input){const text=normalizeText(input);let best={theme:"geral",score:0};Object.entries(keywordThemes).forEach(([theme,words])=>{let score=0;words.forEach(w=>{if(text.includes(normalizeText(w)))score+=2});if(score>best.score)best={theme,score}});return best.theme}
    function extractWords(input){const stop=new Set(["sobre","como","porque","para","qual","quais","voce","você","explique","explica","fale","versiculo","versículo","biblia","bíblia","deus","senhor","jesus","cristo","uma","com","dos","das","que","por","mais","menos","isso","esse","essa","este","esta","tem"]);return normalizeText(input).replace(/[^\w\s]/g," ").split(/\s+/).filter(w=>w.length>3&&!stop.has(w))}
    function findRelatedVerses(input,limit=7){const theme=detectTheme(input);const words=extractWords(input);const themeWords=keywordThemes[theme]||[];const scored=state.flatVerses.map(v=>{const ref=normalizeText(refFor(v));const text=normalizeText(v.text);let score=0;words.forEach(w=>{if(ref.includes(w))score+=3;if(text.includes(w))score+=4});themeWords.forEach(w=>{if(text.includes(normalizeText(w)))score+=2});return{v,score}}).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,limit).map(x=>x.v);return scored.length?scored:state.flatVerses.filter(v=>["Salmos","João","Romanos","Mateus","Provérbios","Filipenses"].includes(v.book)).slice(0,limit)}
    function identifyDirectVerse(input){const m=input.match(/([1-3]?\s?[A-Za-zÁ-ú]+)\s+(\d+):(\d+)/i);if(!m)return null;const raw=normalizeText(m[1].trim());const ch=Number(m[2]);const vs=Number(m[3]);return state.flatVerses.find(v=>normalizeText(v.book).includes(raw)&&v.chapter===ch&&v.verse===vs)||null}
    function verseBlock(verses){return verses.map(v=>`- ${refFor(v)}: ${v.text}`).join("\n")}
    function getMainIdea(theme){const ideas={ansiedade:"Deus chama o coração ansioso para descansar nele, trocar preocupação por oração e confiar no cuidado do Senhor.",fe:"A fé bíblica é confiança prática em Deus, mesmo quando as circunstâncias ainda não mudaram.",amor:"O amor bíblico nasce em Deus e se manifesta em atitudes concretas de cuidado, perdão e serviço.",perdao:"O perdão revela um coração alcançado pela graça e disposto a obedecer a Deus.",medo:"A Palavra mostra que o medo não deve governar o coração; Deus fortalece e sustenta os seus.",familia:"A família é um campo de responsabilidade, amor, ensino e testemunho diante de Deus.",cura:"A Bíblia apresenta Deus como aquele que cuida, consola e pode restaurar segundo a sua vontade.",sabedoria:"Sabedoria bíblica é viver com temor do Senhor, prudência e obediência.",salvacao:"A salvação é dom de Deus, recebida pela fé, centralizada em Cristo.",oracao:"A oração é dependência viva de Deus, entrega, comunhão e confiança.",tristeza:"Deus vê a dor, consola o aflito e sustenta quem se aproxima dele.",geral:"A Palavra de Deus dá direção, corrige o caminho e fortalece a vida espiritual."};return ideas[theme]||ideas.geral}
    function buildFreeAnswer(mode,input){const theme=detectTheme(input);const related=findRelatedVerses(input,7);const direct=identifyDirectVerse(input);const selected=direct?[direct,...related.filter(v=>refFor(v)!==refFor(direct)).slice(0,4)]:related.slice(0,5);const intro=["Analisei sua pergunta usando os textos da Bíblia carregados no app.","Busquei dentro da própria Bíblia os textos mais relacionados com esse tema.","Separei uma resposta bíblica com base no tema e nos versículos encontrados."][Math.floor(Math.random()*3)];const app="- ore sobre esse assunto antes de agir\n- escolha um versículo para meditar hoje\n- aplique uma atitude prática baseada na Palavra";
      if(mode==="explicar"){const v=direct||related[0];return`Explicação bíblica inteligente\n\n${intro}\n\nReferência analisada:\n${v?refFor(v):"trecho informado"}\n\nTexto:\n${v?v.text:input}\n\nIdeia principal:\n${getMainIdea(theme)}\n\nVersículos relacionados:\n${verseBlock(selected)}\n\nAplicação:\n${app}`;}
      if(mode==="reflexao")return`Reflexão bíblica\n\nTema identificado: ${theme}\n\n${getMainIdea(theme)}\n\nVersículos para meditar:\n${verseBlock(selected)}\n\nAplicação para hoje:\n${app}`;
      if(mode==="oracao")return`Oração\n\nSenhor Deus, eu coloco diante de Ti este assunto: ${input}.\nAjuda-me a compreender a Tua vontade, guardar a Tua Palavra e viver com fé verdadeira.\n\nVersículos para lembrar:\n${verseBlock(selected.slice(0,3))}\n\nEm nome de Jesus, amém.`;
      if(mode==="estudo")return`Estudo bíblico inteligente\n\nTema: ${input}\nTema detectado: ${theme}\n\n1. Introdução\n${getMainIdea(theme)}\n\n2. Textos principais\n${verseBlock(selected)}\n\n3. Aplicações práticas\n${app}\n\n4. Perguntas\n- O que Deus está me ensinando?\n- Que atitude preciso corrigir?\n- Como posso praticar isso hoje?`;
      return`Resposta bíblica inteligente\n\nPergunta: ${input}\nTema identificado: ${theme}\n\n${getMainIdea(theme)}\n\nVersículos relacionados:\n${verseBlock(selected)}\n\nOrientação prática:\n${app}`;}
    function askAI(){const mode=el("aiMode").value;const input=el("aiInput").value.trim();if(!input)return toast("Digite sua pergunta");const answer=buildFreeAnswer(mode,input);state.lastAiAnswer=answer;el("aiOutput").textContent=answer}
    function saveAiAsNote(){const text=state.lastAiAnswer.trim();if(!text)return toast("Ainda não há resposta");const ref=el("noteRef").value.trim()||"IA inteligente - estudo";el("noteRef").value=ref;el("noteText").value=text;saveNote();switchView("anotacoes")}

    let deferredPrompt=null;
    window.addEventListener("beforeinstallprompt",(e)=>{e.preventDefault();deferredPrompt=e;el("installBtn").style.display="inline-block"});
    el("installBtn").addEventListener("click",async()=>{if(!deferredPrompt)return toast("Instalação indisponível agora");deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;el("installBtn").style.display="none"});
    window.addEventListener("appinstalled",()=>{toast("App instalado com sucesso");el("installBtn").style.display="none"});
    if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}

    document.querySelectorAll(".menu-btn").forEach(btn=>btn.addEventListener("click",()=>switchView(btn.dataset.view)));
    el("themeToggle").addEventListener("click",()=>{state.theme=state.theme==="dark"?"light":"dark";setTheme();saveLocal()});
    el("bookSelect").addEventListener("change",()=>{state.currentBook=el("bookSelect").value;populateChapters();renderChapter()});
    el("chapterSelect").addEventListener("change",()=>{state.currentChapter=Number(el("chapterSelect").value);renderChapter()});
    el("searchInput").addEventListener("input",()=>{switchView("busca");renderSearch()});
    el("saveNoteBtn").addEventListener("click",saveNote);
    el("clearNoteBtn").addEventListener("click",()=>{el("noteText").value="";saveNote()});
    el("resetPlanBtn").addEventListener("click",resetPlan);
    el("askAiBtn").addEventListener("click",askAI);

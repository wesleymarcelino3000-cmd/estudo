<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bíblia ACF JSON</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="icons/icon-192.png" alt="Ícone" class="brand-icon" />
      <div>
        <h1>Bíblia ACF</h1>
        <p>Leitura em português com JSON, IA, favoritos, anotações e nuvem</p>
      </div>
    </div>
    <button id="themeToggle" class="ghost">Tema</button>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="card">
        <h2>Conta</h2>
        <input id="email" type="email" placeholder="Seu e-mail" />
        <input id="password" type="password" placeholder="Sua senha" />
        <div class="row">
          <button id="registerBtn">Cadastrar</button>
          <button id="loginBtn">Entrar</button>
        </div>
        <button id="logoutBtn" class="ghost full">Sair</button>
        <p id="authStatus" class="muted">Modo local</p>
      </section>

      <section class="card">
        <h2>Navegação</h2>
        <label>Livro</label>
        <select id="bookSelect"></select>
        <label>Capítulo</label>
        <select id="chapterSelect"></select>
        <label>Buscar</label>
        <input id="searchInput" type="text" placeholder="Buscar palavra ou referência..." />
      </section>

      <section class="card">
        <h2>Menu</h2>
        <nav class="menu">
          <button class="menu-btn active" data-view="leitura">Leitura</button>
          <button class="menu-btn" data-view="busca">Busca</button>
          <button class="menu-btn" data-view="ia">IA Bíblica</button>
          <button class="menu-btn" data-view="favoritos">Favoritos</button>
          <button class="menu-btn" data-view="anotacoes">Anotações</button>
          <button class="menu-btn" data-view="plano">Plano</button>
        </nav>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="statusText" class="muted">Carregando Bíblia...</p>
      </section>
    </aside>

    <section class="content">
      <section id="view-leitura" class="view active">
        <div class="card">
          <h2 id="chapterTitle">Leitura</h2>
          <div id="chapterList" class="list"></div>
        </div>
      </section>

      <section id="view-busca" class="view">
        <div class="card">
          <h2>Resultados da busca</h2>
          <div id="searchList" class="list"></div>
        </div>
      </section>

      <section id="view-ia" class="view">
        <div class="card">
          <h2>IA Bíblica</h2>
          <label>Modo</label>
          <select id="aiMode">
            <option value="chat">Chat bíblico</option>
            <option value="explicar">Explicar versículo</option>
            <option value="reflexao">Gerar reflexão</option>
            <option value="oracao">Gerar oração</option>
            <option value="estudo">Estudo completo</option>
          </select>
          <textarea id="aiInput" rows="8" placeholder="Digite sua pergunta..."></textarea>
          <div class="row">
            <button id="askAiBtn">Perguntar à IA</button>
            <button id="saveAiAsNoteBtn" class="ghost">Salvar nas anotações</button>
          </div>
          <div id="aiOutput" class="ai-output">A resposta da IA aparecerá aqui.</div>
        </div>
      </section>

      <section id="view-favoritos" class="view">
        <div class="card">
          <h2>Favoritos</h2>
          <div id="favoritesList" class="list"></div>
        </div>
      </section>

      <section id="view-anotacoes" class="view">
        <div class="card">
          <h2>Anotações</h2>
          <input id="noteRef" type="text" placeholder="Referência. Ex.: João 3:16" />
          <textarea id="noteText" rows="8" placeholder="Escreva sua anotação..."></textarea>
          <div class="row">
            <button id="saveNoteBtn">Salvar anotação</button>
            <button id="clearNoteBtn" class="ghost">Limpar</button>
          </div>
          <div id="notesList" class="list"></div>
        </div>
      </section>

      <section id="view-plano" class="view">
        <div class="card">
          <div class="row between">
            <h2>Plano de leitura</h2>
            <button id="resetPlanBtn" class="ghost">Resetar</button>
          </div>
          <div id="planList" class="plan-grid"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
